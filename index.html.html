<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNyA · Local Florencio Varela</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f11;--s1:#18181b;--s2:#222226;--s3:#2a2a30;--b1:#2e2e35;--b2:#3a3a42;--t1:#f4f4f5;--t2:#a1a1aa;--t3:#71717a;--ro:#f43f5e;--ro-bg:#1f1015;--ro-mid:#3f1020;--am:#f59e0b;--am-bg:#1c1508;--am-mid:#3b2808;--ve:#10b981;--ve-bg:#061510;--ve-mid:#0d2e1e;--az:#3b82f6;--az-bg:#0c1220;--az-mid:#0f1f3d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}

nav{position:sticky;top:0;z-index:100;background:rgba(15,15,17,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:50px}
.nav-brand{font-size:13px;font-weight:600;letter-spacing:-.02em}
.nav-brand span{color:var(--t3);font-weight:400}
.nav-tabs{display:flex;gap:4px}
.nt{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s}
.nt.on,.nt:hover{background:var(--s2);color:var(--t1)}
.nav-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3)}

.pg{display:none;padding:1.5rem;max-width:1100px;margin:0 auto}
.pg.on{display:block}

/* KPIs */
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.kpi{border-radius:12px;padding:18px 20px;border:1px solid var(--b1)}
.kpi.tot{background:var(--s1)}.kpi.ado{background:var(--ro-bg);border-color:var(--ro-mid)}.kpi.abr{background:var(--am-bg);border-color:var(--am-mid)}
.kpi-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.kpi.tot .kpi-lbl{color:var(--t3)}.kpi.ado .kpi-lbl{color:var(--ro)}.kpi.abr .kpi-lbl{color:var(--am)}
.kpi-n{font-size:48px;font-weight:300;line-height:1;letter-spacing:-.04em}
.kpi.tot .kpi-n{color:var(--t1)}.kpi.ado .kpi-n{color:var(--ro)}.kpi.abr .kpi-n{color:var(--am)}
.kpi-sub{font-size:11px;margin-top:5px}
.kpi.tot .kpi-sub{color:var(--t3)}.kpi.ado .kpi-sub{color:#f87090}.kpi.abr .kpi-sub{color:#fbbf50}

.kpis2{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.k2{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px 14px}
.k2-lbl{font-size:10px;color:var(--t3);margin-bottom:5px}
.k2-n{font-size:24px;font-weight:500}
.k2-n.ro{color:var(--ro)}.k2-n.am{color:var(--am)}.k2-n.ve{color:var(--ve)}.k2-n.mu{color:var(--t3)}

/* Alertas */
.alb{border-radius:10px;margin-bottom:10px;overflow:hidden}
.alh{padding:9px 14px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.alb.ro .alh{background:var(--ro-mid);color:var(--ro)}
.alb.am .alh{background:var(--am-mid);color:var(--am)}
.albd{background:var(--s1);border:1px solid var(--b1);border-top:none;border-radius:0 0 10px 10px}
.alr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--b1);font-size:12px}
.alr:last-child{border-bottom:none}
.alr-nm{font-weight:500}
.alr-mt{font-size:11px;color:var(--t3);margin-top:2px}
.tg{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;white-space:nowrap}
.tg.ro{background:var(--ro-mid);color:var(--ro)}.tg.am{background:var(--am-mid);color:var(--am)}.tg.ve{background:var(--ve-mid);color:var(--ve)}.tg.mu{background:var(--s2);color:var(--t3)}

/* Hogares */
.sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin:18px 0 10px}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px}
.divider-line{flex:1;height:1px;background:var(--b1)}
.divider-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.hgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
.hc{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.hc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.hc.cv::before{background:var(--ro)}.hc.ca::before{background:var(--am)}.hc.cp::before{background:var(--ve)}
.hc:hover{border-color:var(--b2);background:var(--s2)}
.hc-nm{font-size:11px;font-weight:600;margin-bottom:6px}
.hc-n{font-size:26px;font-weight:300;letter-spacing:-.03em;margin-bottom:6px}
.hc-bgs{display:flex;gap:4px;flex-wrap:wrap}
.bg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.bg.ado{background:var(--ro-mid);color:var(--ro)}.bg.abr{background:var(--am-mid);color:var(--am)}.bg.vc{background:var(--ro);color:#fff}.bg.cv{background:var(--az-mid);color:var(--az)}

/* Fichas */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fb{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--b1);background:var(--s1);color:var(--t3);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.fb.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.fb:hover:not(.on){border-color:var(--b2);color:var(--t1)}

.hs{margin-bottom:20px}
.hsh{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:8px 8px 0 0;background:var(--s2);border:1px solid var(--b1);border-bottom:none}
.hs-ac{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.hs-nm{font-size:12px;font-weight:600}
.hs-ct{font-size:11px;color:var(--t3)}

.fc{display:grid;grid-template-columns:3px 1fr;background:var(--s1);border:1px solid var(--b1);border-top:none}
.fc:last-child{border-radius:0 0 8px 8px}
.fc:hover{background:var(--s2)}
.fcb{padding:12px 16px;display:grid;grid-template-columns:2.2fr 1fr 0.8fr 0.8fr 1.8fr;gap:12px;align-items:start}
.fc-nm{font-size:13px;font-weight:600;line-height:1.3}
.fc-lg{font-size:10px;font-family:'DM Mono',monospace;color:var(--t3);margin-top:3px}
.fc-mt{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.03em;text-transform:uppercase;display:inline-block;margin-top:5px}
.fc-lbl{font-size:10px;color:var(--t3);margin-bottom:3px}
.fc-val{font-size:11px;color:var(--t2)}
.fc-dias{font-size:22px;font-weight:300;letter-spacing:-.02em}
.obs{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:6px;padding:6px 9px;font-size:11px;color:var(--t1);font-family:'DM Sans',sans-serif;resize:none;height:34px;transition:height .2s,border-color .15s;line-height:1.5}
.obs:focus{outline:none;border-color:var(--b2);height:64px;background:var(--s2)}
.obs::placeholder{color:var(--t3);font-style:italic}
</style>

  'QUFV00457402/25': '09/03/2026 - SIT.DE ADOPTABILIDAD - DECLARACION- PETICION DECLARACION DE SIT. ADOPTABILIDAD',
  'QUFV00490311/26': '28/04/2026 - SOLICITA - A LOCAL ACTUALIZACION DE LEGAJO EN REUNA',
  'QUFV00435931/25': '31/3 EL sl le pide a Flia 1 EGRESO ??? sin registro en reuna ni de vinculacion ni de egreso sigue la situd de adopt',
  'QUFV00484486/26': '20/02/2026 -INFORME INICIAL DEL PER -28/04/2026 - SOLICITA - A LOCAL ACTUALIZACION DE LEGAJO EN REUNA - Zonal: QUILMES',
  'QUFV00486068/26': '09/04/2026 - ADOP.MED.ABRIGO180 DIAS - INFORME SEGUIMIENTO PER 45 DIAS',
  'QUFV00460586/25': '04/26 solicitud de adoptabilidad'
};

async function initObs() {
  try {
    const r = await fetch(SCRIPT_URL + '?action=get');
    const data = await r.json();
    Object.assign(obsCache, data);
  } catch(e) {}
  bPanel();
  bFichas('Todos');
}

function gObs(l) { return obsCache[l] || ''; }

function sObs(l, v) {
  obsCache[l] = v;
  fetch(SCRIPT_URL + '?action=set&legajo=' + encodeURIComponent(l) + '&value=' + encodeURIComponent(v)).catch(()=>{});
  bAlertas();
}
let filtro='Todos';

function bPanel(){
  const tot=D.length,nA=D.filter(p=>p.tipo==='Adoptabilidad').length,nB=D.filter(p=>p.tipo==='Abrigo 180d').length;
  const nV=D.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>180).length;
  const nP=D.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>150&&p.dias_medida<=180).length;
  const nE=D.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida<=150).length;
  const nC=D.filter(p=>p.tipo==='Acción civil').length;
  const nH=[...new Set(D.map(p=>p.hogar))].length;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi tot"><div class="kpi-lbl">Total institucionalizados</div><div class="kpi-n">${tot}</div><div class="kpi-sub">${nH} hogares · datos REUNA abril 2026</div></div>
    <div class="kpi ado"><div class="kpi-lbl">Situación de adoptabilidad</div><div class="kpi-n">${nA}</div><div class="kpi-sub">proceso judicial en curso</div></div>
    <div class="kpi abr"><div class="kpi-lbl">Medida abierta — abrigo</div><div class="kpi-n">${nB}</div><div class="kpi-sub">${nV} vencidas · ${nP} próximas · ${nE} en plazo</div></div>`;

  document.getElementById('kpis2').innerHTML=`
    <div class="k2"><div class="k2-lbl">Abrigo vencido</div><div class="k2-n ro">${nV}</div></div>
    <div class="k2"><div class="k2-lbl">Próximo a vencer</div><div class="k2-n am">${nP}</div></div>
    <div class="k2"><div class="k2-lbl">En plazo</div><div class="k2-n ve">${nE}</div></div>
    <div class="k2"><div class="k2-lbl">Acciones civiles</div><div class="k2-n mu">${nC}</div></div>`;

  bAlertas();

  const hogs=[...new Set(D.map(p=>p.hogar))].sort();
  document.getElementById('hgr').innerHTML=hogs.map(h=>{
    const s=D.filter(p=>p.hogar===h);
    const nA2=s.filter(p=>p.tipo==='Adoptabilidad').length;
    const nB2=s.filter(p=>p.tipo==='Abrigo 180d').length;
    const nV2=s.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>180).length;
    const nC2=s.filter(p=>p.tipo==='Acción civil').length;
    const cl=nV2>0?'cv':nB2>0?'ca':'cp';
    return `<div class="hc ${cl}" onclick="irF('${h}')">
      <div class="hc-nm">${h}</div><div class="hc-n">${s.length}</div>
      <div class="hc-bgs">
        ${nA2>0?`<span class="bg ado">${nA2} adopt.</span>`:''}
        ${nB2>0?`<span class="bg abr">${nB2} abrigo</span>`:''}
        ${nV2>0?`<span class="bg vc">${nV2} venc.</span>`:''}
        ${nC2>0?`<span class="bg cv">${nC2} civil</span>`:''}
      </div></div>`;
  }).join('');
}

function bAlertas(){
  const venc=D.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>180).sort((a,b)=>b.dias_medida-a.dias_medida);
  const prox=D.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>150&&p.dias_medida<=180).sort((a,b)=>b.dias_medida-a.dias_medida);
  const abr=D.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida<=150).sort((a,b)=>b.dias_medida-a.dias_medida);
  const adop=D.filter(p=>p.tipo==='Adoptabilidad').sort((a,b)=>b.dias_medida-a.dias_medida);
  let h='';

  h+=`<div class="alb ro"><div class="alh">Abrigo con medida vencida \xb7 ${venc.length} caso${venc.length!==1?'s':''}</div><div class="albd">`;
  if(venc.length===0){h+=`<div class="alr"><div class="alr-mt">Ninguna medida vencida.</div></div>`;}
  else{venc.forEach(p=>{const ex=p.dias_medida-180;h+=`<div class="alr"><div><div class="alr-nm">${p.nombre}</div><div class="alr-mt">${p.hogar} \xb7 ${p.dias_medida} d\xedas de medida</div></div><span class="tg ro">+${ex} d\xedas vencida</span></div>`;});}
  h+=`</div></div>`;

  h+=`<div class="alb am"><div class="alh">Abrigo \u2014 pr\xf3ximos a vencer (150\u2013180 d\xedas) \xb7 ${prox.length} caso${prox.length!==1?'s':''}</div><div class="albd">`;
  if(prox.length===0){h+=`<div class="alr"><div class="alr-mt">Ninguna medida vence en los pr\xf3ximos 30 d\xedas.</div></div>`;}
  else{prox.forEach(p=>{const f=180-p.dias_medida;h+=`<div class="alr"><div><div class="alr-nm">${p.nombre}</div><div class="alr-mt">${p.hogar} \xb7 ${p.dias_medida} d\xedas de medida</div></div><span class="tg am">vence en ${f} d\xedas</span></div>`;});}
  h+=`</div></div>`;

  h+=`<div class="alb" style="border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden"><div class="alh" style="background:var(--ve-mid);color:var(--ve)">Abrigo en plazo \xb7 ${abr.length} caso${abr.length!==1?'s':''}</div><div class="albd">`;
  if(abr.length===0){h+=`<div class="alr"><div class="alr-mt">Sin casos.</div></div>`;}
  else{abr.forEach(p=>{const f=180-p.dias_medida;h+=`<div class="alr"><div><div class="alr-nm">${p.nombre}</div><div class="alr-mt">${p.hogar} \xb7 ${p.dias_medida} d\xedas de medida</div></div><span class="tg ve">restan ${f} d\xedas</span></div>`;});}
  h+=`</div></div>`;

  h+=`<div class="alb" style="border:1px solid var(--b1);border-radius:10px;margin-bottom:10px;overflow:hidden"><div class="alh" style="background:var(--ro-mid);color:var(--ro)">Situaci\xf3n de adoptabilidad \xb7 ${adop.length} caso${adop.length!==1?'s':''}</div><div class="albd">`;
  adop.forEach(p=>{const cl=dc(p.dias_medida,p.tipo);h+=`<div class="alr"><div><div class="alr-nm">${p.nombre}</div><div class="alr-mt">${p.hogar} \xb7 ${p.dias_medida} d\xedas de medida \xb7 ${p.edad===0?'< 1 a\xf1o':p.edad+' a\xf1os'} \xb7 ${p.sexo}</div></div><span class="tg ${cl}">${p.dias_medida} d\xedas</span></div>`;});
  h+=`</div></div>`;

  document.getElementById('alertas').innerHTML=h;
}

function bFichas(f){
  filtro=f;
  const hogs=['Todos',...[...new Set(D.map(p=>p.hogar))].sort()];
  document.getElementById('fbar').innerHTML=hogs.map(h=>`<button class="fb ${h===f?'on':''}" onclick="bFichas('${h}')">${h}</button>`).join('');
  const activos=f==='Todos'?[...new Set(D.map(p=>p.hogar))].sort():[f];
  let html='';
  activos.forEach(h=>{
    const sub=D.filter(p=>p.hogar===h).sort((a,b)=>b.dias_medida-a.dias_medida);
    if(!sub.length) return;
    const nV=sub.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>180).length;
    const nP=sub.filter(p=>p.tipo==='Abrigo 180d'&&p.dias_medida>150&&p.dias_medida<=180).length;
    const nA=sub.filter(p=>p.tipo==='Adoptabilidad').length;
    const nB=sub.filter(p=>p.tipo==='Abrigo 180d').length;
    const aC=nV>0?'var(--ro)':nP>0?'var(--am)':'var(--ve)';
    html+=`<div class="hs">
      <div class="hsh">
        <div class="hs-ac" style="background:${aC}"></div>
        <div class="hs-nm">${h}</div>
        <div class="hs-ct">${sub.length} casos · ${nA} adoptabilidad · ${nB} abrigo${nV>0?` · <span style="color:var(--ro);font-weight:600">${nV} vencidos</span>`:''}</div>
      </div>`;
    sub.forEach(p=>{
      const c=dc(p.dias_medida,p.tipo);
      const dC=c==='ro'?'var(--ro)':c==='am'?'var(--am)':'var(--ve)';
      const obs=gObs(p.legajo);
      const edTxt=p.edad===0?'< 1 año':`${p.edad} años`;
      html+=`<div class="fc">
        <div style="background:${acC(p)}"></div>
        <div class="fcb">
          <div>
            <div class="fc-nm">${p.nombre}</div>
            <div class="fc-lg">${p.legajo} · DNI ${p.dni}</div>
            ${mTag(p.tipo)}
          </div>
          <div>
            <div class="fc-lbl">Datos personales</div>
            <div class="fc-val">${edTxt} · ${p.sexo==='F'?'F':'M'}</div>
          </div>
          <div>
            <div class="fc-lbl">Días en hogar</div>
            <div class="fc-dias" style="color:${dC}">${p.dias_hogar}</div>
          </div>
          <div>
            <div class="fc-lbl">Días de medida</div>
            <div class="fc-dias" style="color:${dC}">${p.dias_medida}</div>
          </div>
          <div>
            <div class="fc-lbl">Última intervención · Observaciones</div>
            <textarea class="obs" placeholder="Escribir observaciones..."
              onchange="sObs('${p.legajo}',this.value)"
              onfocus="this.style.height='64px'"
              onblur="this.style.height='34px'">${obs}</textarea>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('fcont').innerHTML=html;
}

function irF(h){show('fichas',document.querySelectorAll('.nt')[1]);bFichas(h);}

function show(id,el){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  el.classList.add('on');
  if(id==='fichas') bFichas(filtro);
}

initObs();
</script>
</body>
</html>
