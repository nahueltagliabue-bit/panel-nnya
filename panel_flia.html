<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--s1:#161b27;--s2:#1e2435;--b1:#2a3250;--b2:#3d4d7a;--t1:#e8ecf8;--t2:#a0aeca;--t3:#5a6888;--ro:#ff5f72;--ro-mid:#2a1520;--am:#f5a623;--am-mid:#261d0a;--ve:#3dd68c;--ve-mid:#0d2318;--az:#5b9cf6;--az-mid:#111d38}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh}
header{padding:16px 16px 12px;border-bottom:1px solid var(--b1)}
.logo{font-size:15px;font-weight:700}.logo span{color:var(--az);font-weight:400}
.hdr-sub{font-size:11px;color:var(--t3);margin-top:2px}
.kbar{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}
.kp{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px 14px;flex:1;min-width:100px}
.kp-n{font-size:22px;font-weight:700;line-height:1}.kp-l{font-size:10px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.kp.ro .kp-n{color:var(--ro)}.kp.am .kp-n{color:var(--am)}.kp.az .kp-n{color:var(--az)}
.tabs-wrap{padding:10px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab:hover{border-color:var(--b2);color:var(--t2)}
.tab.on{background:var(--az-mid);border-color:var(--az);color:var(--az)}
.tab.on.ro{background:var(--ro-mid);border-color:var(--ro);color:var(--ro)}
.tab.on.am{background:var(--am-mid);border-color:var(--am);color:var(--am)}
.content{padding:12px 16px}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0 10px}
.divider-line{flex:1;height:1px;background:var(--b1)}
.divider-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.sub-sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:6px;margin:10px 0 6px;display:inline-block}
.sub-sec.ro{background:var(--ro-mid);color:var(--ro)}.sub-sec.am{background:var(--am-mid);color:var(--am)}
.fila{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:1px solid var(--b1);margin-bottom:5px;background:var(--s1)}
.fila:hover{border-color:var(--b2)}
.fila-info{flex:1;min-width:0}
.nm{font-weight:500;color:var(--t1);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.tg.ro{background:var(--ro-mid);color:var(--ro)}.tg.am{background:var(--am-mid);color:var(--am)}.tg.ve{background:var(--ve-mid);color:var(--ve)}
.btn-del{background:transparent;border:1px solid var(--b1);color:var(--t3);border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-del:hover{border-color:var(--ve);color:var(--ve);background:var(--ve-mid)}
.empty{color:var(--t3);font-size:12px;padding:20px 0;text-align:center}
@media(max-width:500px){.kp{min-width:calc(50% - 4px)}}
</style>
</head>

const MESES=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let ocultos=JSON.parse(localStorage.getItem('flia_ocultos')||'[]');
function dias(f){return Math.floor((new Date()-new Date(f))/(864e5));}
function getData(){return _RAW.filter(p=>!ocultos.includes(p.legajo)).map(p=>({...p,dias:dias(p.fecha_medida)}));}
let tabActual='todos';

function getMeses(data){
  const m=[],v=new Set();
  data.forEach(p=>{const k=p.anio+'-'+p.mes;if(!v.has(k)){v.add(k);m.push({mes:p.mes,anio:p.anio,k});}});
  return m.sort((a,b)=>a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes);
}

function render(){
  const data=getData();
  const venc=data.filter(p=>p.dias>180).length;
  const plazo=data.filter(p=>p.dias<=180).length;
  document.getElementById('kbar').innerHTML=`
    <div class="kp az"><div class="kp-n">${data.length}</div><div class="kp-l">Total abiertas</div></div>
    <div class="kp ro"><div class="kp-n">${venc}</div><div class="kp-l">Vencidas</div></div>
    <div class="kp am"><div class="kp-n">${plazo}</div><div class="kp-l">En plazo</div></div>
  `;
  const meses=getMeses(data);
  let tabs=`<button class="tab ${tabActual==='todos'?'on':''}" onclick="setTab('todos')">Todos</button>`;
  meses.forEach(m=>{
    const items=data.filter(p=>p.mes===m.mes&&p.anio===m.anio);
    const vc=items.filter(p=>p.dias>180).length;
    const cl=vc>0?'ro':'am';
    tabs+=`<button class="tab ${tabActual===m.k?'on '+cl:''}" onclick="setTab('${m.k}')">${MESES[m.mes]}${m.anio!==2025?' '+m.anio:''}</button>`;
  });
  document.getElementById('tabs').innerHTML=tabs;
  const filtro=tabActual==='todos'?data:data.filter(p=>p.anio+'-'+p.mes===tabActual);
  const porMes=tabActual==='todos'?meses:meses.filter(m=>m.k===tabActual);
  let html='';
  porMes.forEach(m=>{
    const items=filtro.filter(p=>p.mes===m.mes&&p.anio===m.anio);
    if(!items.length) return;
    const vencidas=items.filter(p=>p.dias>180).sort((a,b)=>b.dias-a.dias);
    const enplazo=items.filter(p=>p.dias<=180).sort((a,b)=>b.dias-a.dias);
    html+=`<div class="divider"><div class="divider-line"></div><div class="divider-lbl">${MESES[m.mes]} ${m.anio}</div><div class="divider-line"></div></div>`;
    if(vencidas.length){
      html+=`<div class="sub-sec ro">Vencidas · ${vencidas.length}</div>`;
      vencidas.forEach(p=>{html+=fila(p,`<span class="tg ro">${p.dias}d · +${p.dias-180}d</span>`);});
    }
    if(enplazo.length){
      html+=`<div class="sub-sec am" style="margin-top:${vencidas.length?'10px':'0'}">En plazo · ${enplazo.length}</div>`;
      enplazo.forEach(p=>{
        const r=180-p.dias;
        html+=fila(p,`<span class="tg ${r<=30?'am':'ve'}">${p.dias}d · vence en ${r}d</span>`);
      });
    }
  });
  document.getElementById('content').innerHTML=html||'<div class="empty">Sin registros.</div>';
}

function fila(p,tag){
  const n2=p.nombre.split(' ').slice(0,2).join(' ');
  return `<div class="fila"><div class="fila-info"><div class="nm">${p.nombre}</div><div class="leg">${p.legajo} · DNI ${p.dni} · ${p.edad===0?'< 1 a.':p.edad+' a.'} · ${p.sexo} · ${p.local}</div></div>${tag}<button class="btn-del" onclick="marcarRevisado('${p.legajo}','${n2.replace(/'/g,"\\'")}')">✓ Revisado</button></div>`;
}

function marcarRevisado(legajo,nombre){
  if(confirm('¿Marcar como revisado y ocultar a '+nombre+'?\n\nSe ocultará hasta que se recargue la lista desde REUNA.')){
    ocultos.push(legajo);
    localStorage.setItem('flia_ocultos',JSON.stringify(ocultos));
    render();
  }
}

function setTab(k){tabActual=k;render();}
render();
</script>
